basePath: /
definitions:
  main.EquipmentDetail:
    properties:
      asset_code:
        type: string
      category:
        type: string
      last_maint_date:
        type: string
      lid:
        type: string
      location:
        type: string
      maint_interval:
        type: integer
      name:
        type: string
      status:
        type: string
    type: object
  main.LoginRequest:
    properties:
      password:
        example: admin
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  main.MaintenanceRequest:
    properties:
      description:
        example: 有異音
        type: string
      equipment_id:
        example: 6f17afc0-1759-45ba-9081-da035eaeea60
        type: string
      reporter_type:
        example: public
        type: string
    required:
    - description
    - equipment_id
    - reporter_type
    type: object
  main.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
host: jupiterhsu.ddns.net
info:
  contact: {}
  description: 這是一個整合 PostgreSQL 與 Gin 的設備管理系統。
  title: 設備管理 API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 驗證使用者名稱與密碼，並回傳 Access Token 與 Refresh Token。
      parameters:
      - description: 登入資訊
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登入成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 請求格式錯誤
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 帳號或密碼錯誤
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 伺服器內部錯誤
          schema:
            additionalProperties: true
            type: object
      summary: 使用者登入
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用有效的 Refresh Token 換取新的 Access Token (此操作不會更換 Refresh Token)
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功，回傳新的 access_token
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Token 無效、已過期或權限錯誤
          schema:
            additionalProperties: true
            type: object
      summary: 刷新 Access Token
      tags:
      - auth
  /api/private/equipments:
    get:
      consumes:
      - application/json
      description: 回傳資料庫中所有設備的完整資訊 (僅限管理員與維修人員)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.EquipmentDetail'
            type: array
        "500":
          description: 資料庫查詢失敗
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 獲取所有設備詳情
      tags:
      - private
  /api/private/maintenance-records:
    get:
      consumes:
      - application/json
      description: 取得所有維修紀錄，可透過 show_resolved 參數決定是否包含已處理的項目
      parameters:
      - description: 是否顯示已處理的紀錄 (true/false)
        in: query
        name: show_resolved
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: 成功回傳維修紀錄列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 資料庫查詢失敗
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 取得維修紀錄列表
      tags:
      - private
  /api/public/equipment:
    get:
      consumes:
      - application/json
      description: 透過 asset_code 取得特定設備的資訊
      parameters:
      - description: 設備資產編號
        in: query
        name: asset_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功回傳設備資訊
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 資產編號必填
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 查詢不到設備
          schema:
            additionalProperties: true
            type: object
      summary: 查詢設備詳情
      tags:
      - public
  /api/public/report:
    post:
      consumes:
      - application/json
      description: Create a new maintenance record for a specific equipment. Checks
        if equipment exists and has no unresolved reports.
      parameters:
      - description: Maintenance Information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.MaintenanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Maintenance record submitted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters or existing unresolved record
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Equipment not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Database error
          schema:
            additionalProperties: true
            type: object
      summary: Post maintenance record
      tags:
      - public
securityDefinitions:
  BearerAuth:
    description: 請輸入 "Bearer <Your_JWT_Token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
