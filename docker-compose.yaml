services:
  # 現在只有這一個 Nginx 了
  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - frontend-net
    restart: always
  backend:
      build: ./backend
      environment:
        - DB_HOST=db
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        - DB_NAME=${DB_NAME}
        - JWT_SECRET=${JWT_SECRET}
      depends_on:
        - db
      networks:
        - frontend-net
        - backend-net
      restart: always
  
  db:
      image: postgres:15-alpine
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      volumes:
        - ./postgres_data:/var/lib/postgresql/data
      networks:
        - backend-net
      restart: always

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge